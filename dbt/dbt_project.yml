name: 'snowflake_cost_analyst'
version: '1.0.0'
config-version: 2

profile: 'snowflake_cost_analyst'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  snowflake_cost_analyst:
    +materialized: table
    +transient: false
    staging:
      +materialized: view
      +tags: ['staging']
      +persist_docs:
        relation: true
        columns: true
    intermediate:
      +tags: ['intermediate']
      +persist_docs:
        relation: true
        columns: true
    marts:
      +tags: ['marts']
      +persist_docs:
        relation: true
        columns: true
    semantic_views:
      +materialized: semantic_view
      +tags: ['semantic_view']

seeds:
  snowflake_cost_analyst:
    +persist_docs:
      relation: true
      columns: true

# Uncomment if using dbt Cloud:
# dbt-cloud:
#   project-id: YOUR_PROJECT_ID

vars:
  # Set to true to read production source data from dev environment
  use_prod_sources_in_dev: false
