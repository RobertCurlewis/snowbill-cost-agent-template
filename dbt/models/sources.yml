version: 2

sources:
  # ==========================================================================
  # SNOWFLAKE.ACCOUNT_USAGE — the source for SnowBill's cost semantic views.
  # Available in every Snowflake account (requires IMPORTED PRIVILEGES on the
  # SNOWFLAKE database, granted to the agent role during setup).
  #
  # The staging/ models are 1:1 wrapper views over these tables. Semantic views
  # read the wrappers, never ACCOUNT_USAGE directly — so an adopter with a
  # MATERIALIZED copy of any table only repoints the matching staging model
  # (or this source), with no semantic-view changes.
  # ==========================================================================
  - name: account_usage
    database: SNOWFLAKE
    schema: ACCOUNT_USAGE
    description: "Snowflake-managed account usage share (cost, query, warehouse, serverless history)."
    tables:
      - name: QUERY_HISTORY
      - name: WAREHOUSE_METERING_HISTORY
      - name: WAREHOUSE_LOAD_HISTORY
      - name: AUTOMATIC_CLUSTERING_HISTORY
      - name: PIPE_USAGE_HISTORY
      - name: REPLICATION_USAGE_HISTORY
      - name: SEARCH_OPTIMIZATION_HISTORY
      - name: METERING_DAILY_HISTORY
      - name: QUERY_ATTRIBUTION_HISTORY
      - name: TAG_REFERENCES
