version: 2

sources:
  # ==========================================================================
  # Define your data sources here.
  # Each source maps to a Snowflake database + schema containing raw/curated
  # tables you want to consume.
  #
  # Pattern: Use Jinja to switch between dev/prod databases:
  #   database: "{{ 'PROD_DB' if target.name != 'dev' else 'DEV_DB' }}"
  #
  # Example:
  # ==========================================================================
  - name: my_source
    description: >
      Example source — replace with your actual data source.
      This maps to a schema in your Snowflake database.
    database: "{{ 'PROD_DB' if (target.name != 'dev' or var('use_prod_sources_in_dev', false)) else 'DEV_DB' }}"
    schema: MY_SOURCE_SCHEMA
    tables:
      - name: EXAMPLE_TABLE
        description: "Replace with your actual table description"
        # columns:
        #   - name: ID
        #     description: "Primary key"
        #     tests:
        #       - not_null
        #       - unique
