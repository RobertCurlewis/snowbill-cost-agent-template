version: 2

models:
  - name: stg_orders
    description: >
      Staging model for raw orders. Maps 1:1 to the source table with
      type casting, renaming to conventions, and test record filtering.
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Customer who placed the order"
        tests:
          - not_null
      - name: order_date
        description: "Date the order was placed"
      - name: order_status
        description: "Current order status (lowercase)"
      - name: total_amount
        description: "Gross order value before discounts"
      - name: discount_amount
        description: "Total discount applied"
      - name: net_amount
        description: "Net value after discounts"
      - name: item_count
        description: "Number of items in the order"
      - name: channel
        description: "Sales channel (web, mobile, in-store)"
      - name: region
        description: "Geographic region"

  - name: fct_orders
    description: >
      Fact table containing completed orders at order grain. This is the
      primary source for the orders semantic view.
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - not_null
          - unique
      - name: net_amount
        description: "Net order value after discounts"
        tests:
          - not_null
