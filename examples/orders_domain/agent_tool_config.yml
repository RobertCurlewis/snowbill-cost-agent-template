# How to add this semantic view as an agent tool
# ================================================
# Add the following to snowflake/agents/agent-specification.yml:

# Under 'tools:':
tool_spec:
  type: "cortex_analyst_text_to_sql"
  name: "orders_analyst"
  description: >-
    Analyses order data including revenue, discounts, volumes,
    channel performance, and regional breakdowns.

# Under 'tool_resources:':
tool_resources:
  orders_analyst:
    semantic_view: "{{ database }}.{{ schema }}.SV_ORDERS"
    execution_environment:
      type: "warehouse"
      warehouse: "{{ warehouse }}"
      query_timeout: 60

# Under 'instructions.orchestration:' add:
orchestration_routing: |
  Use the orders_analyst tool for questions about order volumes, revenue,
  discounts, average order value, channel performance, and regional breakdowns.
